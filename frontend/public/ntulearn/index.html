<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - NTULearn</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-layout">
        <header class="app-header">
            <div class="header-left">
                <div class="logo-area">
                    <span class="logo-text">NTU</span>Learn
                </div>
                <!-- Separator line common in such interfaces -->
                <div class="header-divider"></div>
                <h1 class="page-title">Courses</h1>
            </div>
            <div class="header-right">
                <!-- North Star Toggle -->
                <button id="ns-toggle" class="ns-toggle" aria-label="Toggle North Star mode" title="Enter Study Mode">
                    <svg id="ns-star-icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                    </svg>
                </button>
                <div class="header-divider hidden-ns"></div>
                <a href="#" class="catalog-link hidden-ns">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="16"></line>
                        <line x1="8" y1="12" x2="16" y2="12"></line>
                    </svg>
                    Course Catalogue
                </a>
            </div>
        </header>

        <div class="app-body">
            <aside class="sidebar">
                <nav aria-label="Main Navigation">
                    <ul class="nav-list">
                        <li>
                            <a href="#">
                                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                                    fill="none">
                                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                                </svg>
                                <span>Institution Page</span>
                            </a>
                        </li>
                        <li>
                            <a href="#">
                                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                                    fill="none">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <polyline points="12 6 12 12 16 14"></polyline>
                                </svg>
                                <span>Activity</span>
                            </a>
                        </li>
                        <li class="active">
                            <a href="#">
                                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                                    fill="none">
                                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                                </svg>
                                <span>Courses</span>
                            </a>
                        </li>
                        <li>
                            <a href="#">
                                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                                    fill="none">
                                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="9" cy="7" r="4"></circle>
                                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                                </svg>
                                <span>Communities</span>
                            </a>
                        </li>
                        <li>
                            <a href="#">
                                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                                    fill="none">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="16" y1="2" x2="16" y2="6"></line>
                                    <line x1="8" y1="2" x2="8" y2="6"></line>
                                    <line x1="3" y1="10" x2="21" y2="10"></line>
                                </svg>
                                <span>Calendar</span>
                            </a>
                        </li>
                        <li>
                            <a href="#">
                                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                                    fill="none">
                                    <path
                                        d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z">
                                    </path>
                                    <polyline points="22,6 12,13 2,6"></polyline>
                                </svg>
                                <span>Messages</span>
                            </a>
                        </li>
                        <li>
                            <a href="#">
                                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                                    fill="none">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                    <polyline points="14 2 14 8 20 8"></polyline>
                                    <line x1="16" y1="13" x2="8" y2="13"></line>
                                    <line x1="16" y1="17" x2="8" y2="17"></line>
                                    <polyline points="10 9 9 9 8 9"></polyline>
                                </svg>
                                <span>Grades</span>
                            </a>
                        </li>
                        <li>
                            <a href="#">
                                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                                    fill="none">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <circle cx="12" cy="12" r="4"></circle>
                                    <line x1="4.93" y1="4.93" x2="9.17" y2="9.17"></line>
                                    <line x1="14.83" y1="14.83" x2="19.07" y2="19.07"></line>
                                    <line x1="14.83" y1="9.17" x2="19.07" y2="4.93"></line>
                                    <line x1="14.83" y1="9.17" x2="18.36" y2="5.64"></line>
                                    <line x1="4.93" y1="19.07" x2="9.17" y2="14.83"></line>
                                </svg>
                                <span>Assist</span>
                            </a>
                        </li>
                        <li>
                            <a href="#">
                                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                                    fill="none">
                                    <path
                                        d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z">
                                    </path>
                                </svg>
                                <span>Resources</span>
                            </a>
                        </li>
                    </ul>
                </nav>
                <div class="sidebar-footer">
                    <a href="#" class="sign-out">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                            fill="none">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        <span>Sign Out</span>
                    </a>
                    <div class="footer-links">
                        <a href="#">Privacy</a> &middot;
                        <a href="#">Terms</a> &middot;
                        <a href="#">Accessibility</a>
                    </div>
                </div>
            </aside>

            <main class="main-content">
                <div class="content-wrapper">
                    <div id="normal-mode-container">
                        <!-- Controls Row top area -->
                        <section class="controls-row" aria-label="Course Controls">
                            <div class="controls-left">
                                <div class="view-toggles">
                                    <button id="view-list" class="view-toggle" aria-label="List View">
                                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor"
                                            stroke-width="2" fill="none">
                                            <line x1="8" y1="6" x2="21" y2="6"></line>
                                            <line x1="8" y1="12" x2="21" y2="12"></line>
                                            <line x1="8" y1="18" x2="21" y2="18"></line>
                                            <line x1="3" y1="6" x2="3.01" y2="6"></line>
                                            <line x1="3" y1="12" x2="3.01" y2="12"></line>
                                            <line x1="3" y1="18" x2="3.01" y2="18"></line>
                                        </svg>
                                    </button>
                                    <button id="view-grid" class="view-toggle active" aria-label="Grid View">
                                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor"
                                            stroke-width="2" fill="none">
                                            <rect x="3" y="3" width="7" height="7"></rect>
                                            <rect x="14" y="3" width="7" height="7"></rect>
                                            <rect x="14" y="14" width="7" height="7"></rect>
                                            <rect x="3" y="14" width="7" height="7"></rect>
                                        </svg>
                                    </button>
                                </div>
                                <div class="search-container">
                                    <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16"
                                        stroke="currentColor" stroke-width="2" fill="none">
                                        <circle cx="11" cy="11" r="8"></circle>
                                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                                    </svg>
                                    <input type="text" id="search-input" placeholder="Search your courses"
                                        aria-label="Search your courses">
                                </div>
                            </div>
                            <div class="controls-right">
                                <div class="filter-group">
                                    <label for="term-filter" class="sr-only">Terms</label>
                                    <select id="term-filter" aria-label="Filter by Term">
                                        <option value="all">All terms</option>
                                        <option value="2026-s1">2026 Semester 1</option>
                                        <option value="2025-s2">2025 Semester 2</option>
                                    </select>
                                </div>
                                <div class="filter-group">
                                    <label for="course-filter" class="sr-only">Filters</label>
                                    <select id="course-filter" aria-label="Filter courses">
                                        <option value="all">All courses</option>
                                        <option value="favorites">Favourites</option>
                                    </select>
                                </div>
                                <div class="items-per-page">
                                    <label for="items-per-page-select" class="sr-only">Items per page</label>
                                    <select id="items-per-page-select">
                                        <option value="10">10</option>
                                        <option value="25" selected>25</option>
                                        <option value="50">50</option>
                                    </select>
                                    <span>items per page</span>
                                </div>
                            </div>
                        </section>

                        <div class="results-info">
                            <span id="results-count">0 results</span>
                        </div>

                        <div id="favourites-heading-container" class="section-container">
                            <h2 class="section-title">Favourites</h2>
                        </div>

                        <section class="courses-section" aria-label="Courses List">
                            <div id="course-grid" class="courses-grid grid-view">
                                <!-- Populated by app.js -->
                            </div>
                        </section>
                    </div> <!-- End normal-mode-container -->


                </div>
            </main>
        </div>
    </div>
    <!-- Cinematic Transition Overlay -->
    <div id="cinematic-overlay">
        <svg class="cinematic-svg" width="100%" height="100%">
            <defs>
                <mask id="hole-mask">
                    <rect width="100%" height="100%" fill="white" />
                    <circle id="hole-circle" cx="50%" cy="50%" r="0" fill="black" />
                </mask>
            </defs>
            <rect id="cinematic-bg-rect" width="100%" height="100%" fill="black" mask="url(#hole-mask)" />
        </svg>
        <div id="cinematic-stars"></div>
    </div>
    <script src="app.js"></script>
</body>

</html>
